name: 🐛 Bug report
description: Report something that isn't working as expected.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below so we can reproduce and fix it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I run ..., I expected ... but got ...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it? Include commands, inputs, or a minimal example.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Versions and setup relevant to the bug.
      placeholder: |
        - Repository / version or commit:
        - OS:
        - Tool versions (e.g. GAMS, Python, Node):
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant error output. Do not include secrets or confidential data.
      render: shell
    validations:
      required: false
